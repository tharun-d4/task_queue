global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "server"
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: "worker"
    scrape_interval: 5s
    static_configs:
      - targets: ["push_gateway:9091"]
